name: CI/CD Pipeline

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]

permissions:
  contents: read
  packages: read

jobs:
  # Jobs that run on Pull Requests to develop
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 + Maven settings
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: USERNAME
          server-password: TOKEN_PACKAGE
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}

      # cat the settings.xml to the console for debugging purposes
      - name: Print Maven settings.xml
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}
        run: cat ~/.m2/settings.xml

      - name: Add GitHub package registry to Maven settings
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}
        run: |
          SETTINGS_FILE="$HOME/.m2/settings.xml"
          echo "[DEBUG] settings.xml before update:"
          cat "$SETTINGS_FILE" || true

          # Inject a profile that declares GitHub Packages and Central as repositories,
          # and activate it so Maven can resolve private artifacts.
          awk '/<\/settings>/ && !x {print "  <profiles>\n    <profile>\n      <id>github</id>\n      <repositories>\n        <repository>\n          <id>central</id>\n          <url>https://repo.maven.apache.org/maven2</url>\n        </repository>\n        <repository>\n          <id>github</id>\n          <url>https://maven.pkg.github.com/MyCloseShop</url>\n          <snapshots>\n            <enabled>true</enabled>\n          </snapshots>\n        </repository>\n      </repositories>\n    </profile>\n  </profiles>\n  <activeProfiles>\n    <activeProfile>github</activeProfile>\n  </activeProfiles>"; x=1 } 1' "$SETTINGS_FILE" > "$SETTINGS_FILE.tmp"
          mv "$SETTINGS_FILE.tmp" "$SETTINGS_FILE"

          echo "[DEBUG] settings.xml after update:"
          cat "$SETTINGS_FILE"


      - uses: actions/cache@v3
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Validate Maven project
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}
        run: mvn validate

      - name: Build
        env:
          USERNAME: ${{ github.actor }}
          TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}
        run: mvn -B -U clean package -DskipTests

      - name: Run tests
        run: mvn test -Dspring.profiles.active=test

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: target/*.jar

  # Jobs that run on push to develop (after PR merge)
  code-quality:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github-common-api,github-security-api
          server-username: GITHUB_ACTOR,GITHUB_ACTOR
          server-password: TOKEN_PACKAGE,TOKEN_PACKAGE

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Maven checkstyle
        run: mvn checkstyle:check
        continue-on-error: true

      - name: Run SpotBugs analysis
        run: mvn spotbugs:check
        continue-on-error: true

      - name: Run PMD analysis
        run: mvn pmd:check
        continue-on-error: true

      - name: Generate code coverage report
        run: mvn test jacoco:report -Dspring.profiles.active=test

      - name: Upload code coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: target/site/jacoco/

  security-scan:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github-common-api,github-security-api
          server-username: GITHUB_ACTOR,GITHUB_ACTOR
          server-password: TOKEN_PACKAGE,TOKEN_PACKAGE

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: target/dependency-check-report.html

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [ code-quality, security-scan ]
    env:
      TOKEN_PACKAGE: ${{ secrets.TOKEN_PACKAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github-common-api,github-security-api
          server-username: GITHUB_ACTOR,GITHUB_ACTOR
          server-password: TOKEN_PACKAGE,TOKEN_PACKAGE

      - name: Build final artifact
        run: mvn clean package -DskipTests

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifact
          path: target/*.jar

      # Add your deployment steps here (Docker, Azure, AWS, etc.)
      - name: Deploy to staging
        run: echo "Add your deployment commands here"

